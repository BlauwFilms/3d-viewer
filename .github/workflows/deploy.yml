name: Deploy to CDN

on:
  # Run on version tags like v0.1.0, v1.2.3
  push:
    tags:
      - 'v*.*.*'
  # Also allow manual runs for the latest main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cdn-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build viewer
        run: npm run build

      - name: Extract version
        id: version
        run: |
          # From tag refs/tags/v1.2.3 -> 1.2.3; fallback to package.json on dispatch.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -p "require('./packages/viewer/package.json').version")
          fi
          MAJOR="${VERSION%%.*}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"

      - name: Checkout cdn branch
        uses: actions/checkout@v4
        with:
          ref: cdn
          path: cdn-out
          # If cdn branch doesn't exist yet this step creates an empty one.
          fetch-depth: 0

      - name: Publish versioned + major-pinned bundles
        env:
          VERSION: ${{ steps.version.outputs.version }}
          MAJOR: ${{ steps.version.outputs.major }}
        run: |
          set -euo pipefail

          DIST_SRC="packages/viewer/dist"
          CDN_DIR="cdn-out"

          VERSIONED_PATH="$CDN_DIR/viewer/v${VERSION}"
          MAJOR_PATH="$CDN_DIR/viewer/v${MAJOR}"

          # Exact-version directory, never overwritten.
          mkdir -p "$VERSIONED_PATH"
          cp -R "$DIST_SRC"/* "$VERSIONED_PATH/"

          # Major-version directory, always points at the latest within that major.
          rm -rf "$MAJOR_PATH"
          mkdir -p "$MAJOR_PATH"
          cp -R "$DIST_SRC"/* "$MAJOR_PATH/"

          # Write a tiny index manifest so we can inspect what's live.
          cat > "$CDN_DIR/index.json" <<EOF
          {
            "latest": "${VERSION}",
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "urls": {
              "versioned": "/viewer/v${VERSION}/blauw.mjs",
              "major": "/viewer/v${MAJOR}/blauw.mjs"
            }
          }
          EOF

      - name: Commit & push cdn branch
        run: |
          cd cdn-out
          git config user.name "blauw-bot"
          git config user.email "bot@blauwfilms.com"
          git add .
          if git diff --cached --quiet; then
            echo "No CDN changes to commit."
          else
            git commit -m "Publish viewer v${{ steps.version.outputs.version }}"
            git push origin cdn
          fi
